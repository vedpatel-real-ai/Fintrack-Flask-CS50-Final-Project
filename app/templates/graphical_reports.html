{% extends "layout.html" %}
{% block title %}Analytics{% endblock %}
{% block page_title %}Analytics{% endblock %}

{% block content %}
<div id="chartsEmptyState" class="empty-state d-none">
    <i class="bi bi-bar-chart"></i>
    <p class="mb-2">Not enough data yet to draw charts.</p>
    <a href="{{ url_for('expenses.add_expense') }}" class="btn btn-sm btn-primary">Add an expense</a>
</div>

<div id="chartsContainer" class="row g-3">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">Expenses Over Time</div>
            <div class="card-body"><canvas id="lineChart" height="110"></canvas></div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card">
            <div class="card-header">By Category</div>
            <div class="card-body"><canvas id="pieChart" height="110"></canvas></div>
        </div>
    </div>
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                Spending by Category
                <button id="exportPdf" class="btn btn-sm btn-outline-secondary"><i class="bi bi-file-earmark-pdf me-1"></i>Export Charts to PDF</button>
            </div>
            <div class="card-body"><canvas id="barChart" height="90"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
fetch("{{ url_for('reports.expense_data') }}")
    .then(function (response) { return response.json(); })
    .then(function (data) {
        if (!data.length) {
            document.getElementById('chartsContainer').classList.add('d-none');
            document.getElementById('chartsEmptyState').classList.remove('d-none');
            return;
        }

        var accent = getComputedStyle(document.documentElement).getPropertyValue('--ft-accent').trim() || '#4f46e5';
        var palette = ['#4f46e5', '#0ea5e9', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

        var byDate = {};
        data.forEach(function (e) { byDate[e.date] = (byDate[e.date] || 0) + e.amount; });
        var dates = Object.keys(byDate).sort();

        var categories = [...new Set(data.map(function (e) { return e.category; }))];
        var categoryTotals = categories.map(function (cat) {
            return data.filter(function (e) { return e.category === cat; })
                        .reduce(function (sum, e) { return sum + e.amount; }, 0);
        });

        new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Spending',
                    data: dates.map(function (d) { return byDate[d]; }),
                    borderColor: accent, backgroundColor: accent + '22', fill: true, tension: 0.3,
                }],
            },
            options: { plugins: { legend: { display: false } } },
        });

        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: categories, datasets: [{ label: 'Total', data: categoryTotals, backgroundColor: palette }] },
            options: { plugins: { legend: { display: false } } },
        });

        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: categories, datasets: [{ data: categoryTotals, backgroundColor: palette }] },
        });

        document.getElementById('exportPdf').addEventListener('click', async function () {
            var jsPDFCtor = window.jspdf.jsPDF;
            var pdf = new jsPDFCtor('landscape');
            var charts = [
                { canvas: document.getElementById('lineChart'), title: 'Expenses Over Time' },
                { canvas: document.getElementById('barChart'), title: 'Spending by Category' },
                { canvas: document.getElementById('pieChart'), title: 'By Category' },
            ];
            for (var i = 0; i < charts.length; i++) {
                var canvas = await html2canvas(charts[i].canvas);
                var imgData = canvas.toDataURL('image/png');
                pdf.text(charts[i].title, 10, 12);
                pdf.addImage(imgData, 'PNG', 10, 20, 260, 140);
                if (i < charts.length - 1) pdf.addPage();
            }
            pdf.save('fintrack_charts.pdf');
        });
    });
</script>
{% endblock %}
