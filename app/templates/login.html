{% extends "layout.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="guest-hero">
    <div class="card auth-card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-1">Welcome back</h3>
            <p class="text-secondary mb-4">Log in to your FinTrack account.</p>

            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
                    <label class="form-check-label" for="remember_me">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-2">Log In</button>
                <a href="{{ url_for('auth.demo') }}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-rocket-takeoff-fill me-1"></i> Try Demo instead
                </a>
            </form>

            <p class="text-center small text-muted mt-3 mb-0">
                No account? <a href="{{ url_for('auth.register') }}">Register here</a> &middot;
                <a href="#" tabindex="-1" class="text-muted" title="Not implemented in this portfolio build">Forgot password?</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
